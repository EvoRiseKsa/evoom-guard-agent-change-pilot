name: EvoGuard Git Pin Probe
run-name: "Observe hosted Git @ ${{ github.sha }}"

on:
  workflow_dispatch:

permissions: {}

jobs:
  probe:
    if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Observe the exact protected Git executable
        shell: bash
        env:
          RUNNER_OS_NAME: ${{ runner.os }}
          RUNNER_ARCH_NAME: ${{ runner.arch }}
        run: |
          set -euo pipefail
          executable="$(readlink -f "$(command -v git)")"
          test "$executable" = "/usr/bin/git"
          test -f "$executable"
          test ! -L "$executable"
          digest="$(sha256sum "$executable" | awk '{print $1}')"
          [[ "$digest" =~ ^[0-9a-f]{64}$ ]]
          {
            printf '## EvoGuard Git executable observation\n\n'
            printf -- '- runner: %s/%s on ubuntu-24.04\n' "$RUNNER_OS_NAME" "$RUNNER_ARCH_NAME"
            printf -- '- executable: %s\n' "$executable"
            printf -- '- SHA-256: %s\n' "$digest"
            printf -- '- workflow commit: %s\n' "$GITHUB_SHA"
          } >> "$GITHUB_STEP_SUMMARY"
          printf 'git_executable=%s\n' "$executable"
          printf 'git_sha256=%s\n' "$digest"
